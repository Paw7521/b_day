<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
}

.start-page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
text-align:center;
}

.start-box{
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.start-box h1{
color:#ff4081;
font-size:30px;
margin-bottom:20px;
}

.start-box p{
font-size:18px;
color:#555;
}

.start-btn{
margin-top:25px;
padding:14px 35px;
border:none;
border-radius:30px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
}


.birthday-page{

display:none;
height:100vh;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);

}


.card{

width:360px;
background:white;
border-radius:25px;
padding:25px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.25);
position:relative;

}


h1{
color:#ff4081;
margin-bottom:10px;
}


.name{

font-size:35px;
font-weight:bold;
color:#8e44ad;
animation:float 3s infinite ease-in-out;

}


@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0);
}

}


.date{

margin:15px;
color:#555;
font-size:18px;

}


.quote{

margin-top:15px;
font-size:17px;
color:#444;
line-height:1.5;

}


.heart{

position:absolute;
font-size:25px;
animation:rise 5s linear infinite;

}


@keyframes rise{

from{
bottom:-20px;
opacity:1;
}

to{
bottom:100%;
opacity:0;
}

}


.surprise-btn{

margin-top:20px;
padding:12px 25px;
border:none;
background:#ff4081;
color:white;
border-radius:30px;
font-size:16px;

}


/* Youtube hidden */

#player{
width:1px;
height:1px;
position:absolute;
opacity:0;
}

</style>

</head>


<body>


<!-- YOUTUBE PLAYER -->

<div id="player"></div>



<!-- FIRST PAGE -->

<div class="start-page" id="start">

<div class="start-box">

<h1>🎁 A Special Surprise</h1>

<p>
Seema ke liye ek chhota sa .... ❤️
</p>


<button class="start-btn" onclick="openGift()">
Open with 💖
</button>


</div>

</div>




<!-- BIRTHDAY PAGE -->


<div class="birthday-page" id="birthday">


<div class="card">


<div class="heart" style="left:20%">
❤️
</div>


<div class="heart" style="left:70%;animation-delay:2s">
💖
</div>


<h1>
🎂 Happy Birthday
</h1>


<div class="name">
Seema Yadav
</div>


<div class="date">
26 July 2001 ✨
</div>


<div class="quote">

"Zindagi ka har pal khushiyon se bhara ho,
aapki har dua kabul ho." ❤️

<br><br>

"Muskurahat aapki hamesha bani rahe,
aur har din ek nayi khushi laaye." 🌸

</div>


<button class="surprise-btn" onclick="wish()">
🎁 Message
</button>


</div>

</div>




<!-- YOUTUBE API -->

<script src="https://www.youtube.com/iframe_api"></script>


<script>


let player;


function onYouTubeIframeAPIReady(){

player = new YT.Player('player',{

height:'1',
width:'1',

videoId:'HP2zqQsrsyg',

playerVars:{

autoplay:0,
start:12

}

});

}



function openGift(){

document.getElementById("start").style.display="none";

document.getElementById("birthday").style.display="flex";


// music start after button click

if(player){

player.playVideo();

}

}



function wish(){

alert("❤️ Happy Birthday Seema Yadav ❤️\n\nAap hamesha khush raho aur zindagi me bahut tarakki karo 🎂✨");

}


</script>


</body>
</html>
